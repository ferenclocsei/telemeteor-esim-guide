<!doctype html><meta charset="utf-8"><title>TS screens audit</title>
<style>body{font:13px system-ui;background:#eef2f7;margin:0;padding:16px}
.grid{display:flex;flex-wrap:wrap;gap:18px}
figure{margin:0;text-align:center}
.p{width:190px;aspect-ratio:300/470;overflow:hidden;border-radius:30px;background:#0b1220;padding:8px;box-shadow:0 10px 24px rgba(0,0,0,.2)}
.s{width:100%;height:100%;border-radius:22px;overflow:hidden;background:#fff}
svg{width:100%;height:100%;display:block}</style>
<div class="grid" id="g"></div>
<script>
const files=["airplane","apn","data-line","esim-on","network","region","restart","roaming"];
(async()=>{for(const f of files){
  const t=await (await fetch(`../assets/illustrations/ts/${f}.svg?_=${Date.now()}`)).text();
  const d=new DOMParser().parseFromString(t,"image/svg+xml");
  const svg=d.documentElement; svg.setAttribute("preserveAspectRatio","xMidYMin slice");
  const fig=document.createElement("figure");
  fig.innerHTML=`<div class="p"><div class="s"></div></div><figcaption>${f}</figcaption>`;
  fig.querySelector(".s").appendChild(svg); g.appendChild(fig);
}})();
</script>
