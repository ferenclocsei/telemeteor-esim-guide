<!doctype html><meta charset="utf-8"><title>Flow audit</title>
<style>body{font:12px system-ui;background:#0f172a;color:#e2e8f0;margin:0;padding:12px}
.grid{display:flex;flex-wrap:wrap;gap:10px}
figure{margin:0;width:174px;text-align:center}
.wrap{position:relative;width:174px;aspect-ratio:220/462;border-radius:26px;background:#0b1220;padding:7px}
.scr{position:relative;width:100%;height:100%;border-radius:20px;overflow:hidden;background:#f2f2f7}
svg{position:absolute;inset:0;width:100%;height:100%}
.ring{position:absolute;transform:translate(-50%,-50%);border-radius:999px;
      box-shadow:0 0 0 2.5px #FF6600;pointer-events:none}
.ring.rect{border-radius:10px}
figcaption{font-size:10px;margin-top:4px;color:#94a3b8;line-height:1.3}
h2{font-size:13px;margin:16px 0 6px;color:#fb923c}</style>
<div id="bar"></div><div id="out"></div>
<script>
function fit(svgEl){const vb=svgEl.viewBox.baseVal,W=vb.width||300,PAD=10;
 svgEl.querySelectorAll('text[data-key]').forEach(el=>{let len;try{len=el.getComputedTextLength()}catch(e){return}
 if(!len)return;const x=parseFloat(el.getAttribute('x'))||0,an=el.getAttribute('text-anchor')||'start';
 let av=an==='middle'?2*Math.min(x-PAD,W-x-PAD):an==='end'?x-PAD:W-x-PAD;
 const d=parseFloat(el.getAttribute('data-maxw'));if(!isNaN(d))av=Math.min(av,d);
 if(av<=0||len<=av)return;const b=parseFloat(el.getAttribute('font-size'))||14;
 el.setAttribute('font-size',Math.max(7.5,b*(av/len)).toFixed(2));});}

const q=new URLSearchParams(location.search);
const LANG=q.get('lang')||'hu';
const ONLY=q.get('os');
const ALL=[['ios','qr'],['ios','manual'],['ios','link'],
              ['android-samsung','manual'],['android-samsung','qr'],['android-samsung','link'],
              ['android-pixel','manual'],['android-pixel','qr'],['android-pixel','link'],
              ['android-generic','manual'],['android-generic','qr'],['android-generic','link']];
const COMBOS = ONLY ? ALL.filter(c=>c[0]===ONLY) : ALL;
(async()=>{
 const S=await (await fetch(`../content/strings/${LANG}.json?_=`+Date.now())).json();
 // Exactly the resolution js/i18n.js uses, so this audit cannot lie to me.
 const t=k=>{if(!k)return'';
   if(k.startsWith('ui.'))return S.ui?S.ui[k.slice(3)]:undefined;
   if(k.startsWith('screen.'))return S.screen?S.screen[k.slice(7)]:undefined;
   return S.steps?S.steps[k]:undefined;};
 let problems=[];
 for(const [os,del] of COMBOS){
  const st=await (await fetch(`../content/structure/${os}.json?_=`+Date.now())).json();
  const steps=st.steps.filter(s=>s.appliesTo.includes('all')||s.appliesTo.includes(del));
  const h=document.createElement('h2');h.textContent=`${os} · ${del} · ${steps.length} steps`;out.appendChild(h);
  const g=document.createElement('div');g.className='grid';out.appendChild(g);
  for(const s of steps){
   const txt=await (await fetch(`../assets/illustrations/${s.illustration}?_=`+Date.now())).text();
   const svg=new DOMParser().parseFromString(txt,'image/svg+xml').documentElement;
   svg.querySelectorAll('[data-key]').forEach(e=>{const v=t(e.getAttribute('data-key'));
     if(v===undefined){problems.push(`${os}/${s.id}: SVG key ${e.getAttribute('data-key')}`);e.textContent='⟨?⟩';}
     else e.textContent=v;});
   svg.setAttribute('preserveAspectRatio','xMidYMid slice');
   const title=t(s.titleKey);
   if(title===undefined)problems.push(`${os}/${s.id}: title ${s.titleKey}`);
   const fig=document.createElement('figure');
   fig.innerHTML=`<div class="wrap"><div class="scr"></div></div><figcaption>${s.id}<br>${title||'⟨missing⟩'}</figcaption>`;
   const scr=fig.querySelector('.scr');scr.appendChild(svg);
   for(const tp of s.tapPoints||[]){
    const r=document.createElement('div');
    r.className='ring'+(tp.shape==='rect'?' rect':'');
    r.style.cssText+=`left:${tp.x}%;top:${tp.y}%;width:${tp.w||86}%;height:${tp.h||11}%`;
    scr.appendChild(r);
    if(tp.x-(tp.w||86)/2<-1||tp.x+(tp.w||86)/2>101||tp.y-(tp.h||11)/2<-1||tp.y+(tp.h||11)/2>101)
      problems.push(`${os}/${s.id}: ring outside the screen`);
   }
   g.appendChild(fig);fit(svg);
  }
 }
 // The complaint that started this pass: a ring edge slicing through a label.
 // Measure it for real, in the rendered DOM, rather than trusting the numbers.
 await new Promise(r=>setTimeout(r,60));
 document.querySelectorAll('figure').forEach(fig=>{
  const cap=fig.querySelector('figcaption').textContent.split('\n')[0];
  fig.querySelectorAll('.ring').forEach(r=>{
    const rb=r.getBoundingClientRect();
    fig.querySelectorAll('svg text').forEach(t=>{
      const cb=t.getBoundingClientRect(); if(cb.width<2) return;
      const inside = cb.left>rb.left+3 && cb.right<rb.right-3 && cb.top>rb.top+3 && cb.bottom<rb.bottom-3;
      const hits = cb.left<rb.right && cb.right>rb.left && cb.top<rb.bottom && cb.bottom>rb.top;
      if(hits && !inside) problems.push(`${cap}: ring edge crosses "${t.textContent.slice(0,20)}"`);
    });
  });
 });
 problems=[...new Set(problems)];
 window.__problems=problems;
 bar.textContent=`${LANG} — ${problems.length} problems`+(problems.length?': '+problems.slice(0,5).join(' | '):'');
})();
</script>
