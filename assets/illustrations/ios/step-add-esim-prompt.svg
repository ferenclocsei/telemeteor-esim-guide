<svg viewBox="0 0 300 630" xmlns="http://www.w3.org/2000/svg">
  <rect width="300" height="630" fill="#f4f6fa"/>

  <!-- The Settings screen the sheet appears over, dimmed the way iOS dims it. -->
  <g opacity="0.55">
    <text x="24" y="30" font-family="ui-sans-serif,system-ui,sans-serif" font-size="14" font-weight="600" fill="#182746">9:41</text>
    <g stroke="#182746" stroke-width="1.4" fill="none" opacity="0.75">
      <path d="M236 25 l4 -6 l4 6z" fill="#182746" stroke="none"/>
      <path d="M248 25 a7 7 0 0 1 10 0"/>
      <rect x="264" y="18" width="16" height="9" rx="2"/>
      <rect x="266" y="20" width="9" height="5" fill="#182746" stroke="none"/>
    </g>
    <rect x="18" y="100" width="264" height="56" rx="16" fill="#ffffff"/>
    <circle cx="46" cy="128" r="12" fill="#c9d2de"/>
    <rect x="70" y="123" width="130" height="10" rx="5" fill="#c9d2de"/>
    <rect x="18" y="164" width="264" height="56" rx="16" fill="#ffffff"/>
    <circle cx="46" cy="192" r="12" fill="#c9d2de"/>
    <rect x="70" y="187" width="104" height="10" rx="5" fill="#c9d2de"/>
    <rect x="18" y="228" width="264" height="56" rx="16" fill="#ffffff"/>
    <circle cx="46" cy="256" r="12" fill="#c9d2de"/>
    <rect x="70" y="251" width="146" height="10" rx="5" fill="#c9d2de"/>
    <rect x="18" y="292" width="264" height="56" rx="16" fill="#ffffff"/>
    <circle cx="46" cy="320" r="12" fill="#c9d2de"/>
    <rect x="70" y="315" width="118" height="10" rx="5" fill="#c9d2de"/>
    <rect x="18" y="356" width="264" height="56" rx="16" fill="#ffffff"/>
    <circle cx="46" cy="384" r="12" fill="#c9d2de"/>
    <rect x="70" y="379" width="136" height="10" rx="5" fill="#c9d2de"/>
    <rect x="18" y="420" width="264" height="56" rx="16" fill="#ffffff"/>
    <circle cx="46" cy="448" r="12" fill="#c9d2de"/>
    <rect x="70" y="443" width="112" height="10" rx="5" fill="#c9d2de"/>
    <rect x="18" y="484" width="264" height="56" rx="16" fill="#ffffff"/>
    <circle cx="46" cy="512" r="12" fill="#c9d2de"/>
    <rect x="70" y="507" width="142" height="10" rx="5" fill="#c9d2de"/>
  </g>

  <!-- Scrim: the sheet is what matters, everything behind it steps back. -->
  <rect width="300" height="630" fill="#182746" opacity="0.45"/>

  <!-- The confirmation sheet. -->
  <rect x="26" y="196" width="248" height="248" rx="26" fill="#ffffff"/>
  <circle cx="150" cy="248" r="26" fill="#baddff"/>
  <g fill="none" stroke="#182746" stroke-width="2.4">
    <rect x="140" y="240" width="20" height="14" rx="3"/>
    <path d="M144 240 v-4 a6 6 0 0 1 12 0 v4"/>
  </g>
  <text data-key="screen.add-esim-prompt.title" x="150" y="306" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="17" font-weight="700" fill="#182746">Add eSIM?</text>
  <text data-key="screen.add-esim-prompt.subtitle" x="150" y="328" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="11" fill="#5b6b8c">A cellular plan was found</text>

  <!-- Primary action gets the full sheet width, so no label is ever cramped. -->
  <rect x="48" y="348" width="204" height="44" rx="22" fill="#007aff"/>
  <text data-key="screen.add-esim-prompt.add" data-maxw="188" x="150" y="376" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="13" font-weight="700" fill="#ffffff">Add eSIM</text>
  <text data-key="screen.add-esim-prompt.cancel" x="150" y="422" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="12" fill="#5b6b8c">Cancel</text>

  <rect x="112" y="606" width="76" height="5" rx="2.5" fill="#ffffff" opacity="0.6"/>
</svg>
